name: Pylint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          # Optional: if you have dependencies needed for imports, install them:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pylint (fail if score < 8.0)
        run: |
          # Find all tracked Python files (avoids venvs, build dirs, etc.)
          files=$(git ls-files "*.py")
          if [ -z "$files" ]; then
            echo "No Python files found."
            exit 0
          fi

          pylint $files --fail-under=8.0